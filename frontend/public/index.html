    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%PUBLIC_URL%/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="%PUBLIC_URL%/icons/icon-192x192.png" />
    
    <!-- Splash Screens for iOS -->
    <link rel="apple-touch-startup-image" href="%PUBLIC_URL%/icons/icon-512x512.png" />
    
    <title>FinanceFlow</title>
    
    <!-- Preconnect to API -->
    <link rel="preconnect" href="https://finance-hub-488.preview.emergentagent.com" />
    
    <script src="https://assets.emergent.sh/scripts/emergent-main.js"></script>
    <script>
        if (window.self !== window.top) {
            var debugMonitorScript = document.createElement('script');
            debugMonitorScript.src = 'https://assets.emergent.sh/scripts/debug-monitor.js';
            document.head.appendChild(debugMonitorScript);
            window.tailwind = window.tailwind || {};
            tailwind.config = { corePlugins: { preflight: false } };
            var tailwindScript = document.createElement('script');
            tailwindScript.src = 'https://cdn.tailwindcss.com';
            document.head.appendChild(tailwindScript);
        }
    </script>
    
    <style>
        /* PWA Install Prompt Styles */
        .pwa-install-prompt {
            position: fixed;
            bottom: 80px;
            left: 16px;
            right: 16px;
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            z-index: 10000;
            display: none;
            animation: slideUp 0.3s ease;
        }
        .pwa-install-prompt.show { display: block; }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .pwa-install-prompt h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1e293b;
        }
        .pwa-install-prompt p {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 12px;
        }
        .pwa-install-prompt .buttons {
            display: flex;
            gap: 8px;
        }
        .pwa-install-prompt button {
            flex: 1;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
        }
        .pwa-install-prompt .install-btn {
            background: #2563eb;
            color: white;
        }
        .pwa-install-prompt .dismiss-btn {
            background: #f1f5f9;
            color: #64748b;
        }
        
        /* Safe area for notch devices */
        body {
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
    </style>
</head>
<body>
    <noscript>Você precisa habilitar JavaScript para usar este app.</noscript>
    <div id="root"></div>
    
    <!-- PWA Install Prompt -->
    <div id="pwa-install-prompt" class="pwa-install-prompt">
        <h3>📱 Instalar FinanceFlow</h3>
        <p>Adicione o app à sua tela inicial para acesso rápido!</p>
        <div class="buttons">
            <button class="dismiss-btn" onclick="dismissInstallPrompt()">Agora não</button>
            <button class="install-btn" onclick="installPWA()">Instalar</button>
        </div>
    </div>
    
    <!-- Service Worker Registration -->
    <script>
        let deferredPrompt;
        
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then((registration) => {
                        console.log('SW registered:', registration);
                    })
                    .catch((error) => {
                        console.log('SW registration failed:', error);
                    });
            });
        }
        
        // Handle PWA Install Prompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            // Show install prompt after 30 seconds if not dismissed before
            const dismissed = localStorage.getItem('pwa-install-dismissed');
            if (!dismissed) {
                setTimeout(() => {
                    document.getElementById('pwa-install-prompt').classList.add('show');
                }, 30000);
            }
        });
        
        function installPWA() {
            const prompt = document.getElementById('pwa-install-prompt');
            prompt.classList.remove('show');
            
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted PWA install');
                    }
                    deferredPrompt = null;
                });
            }
        }
        
        function dismissInstallPrompt() {
            document.getElementById('pwa-install-prompt').classList.remove('show');
            localStorage.setItem('pwa-install-dismissed', 'true');
        }
        
        // Handle app installed
        window.addEventListener('appinstalled', () => {
            console.log('PWA installed');
            document.getElementById('pwa-install-prompt').classList.remove('show');
        });
    </script>
    
    <a
        id="emergent-badge"
        target="_blank"
        href="https://app.emergent.sh/?utm_source=emergent-badge"
        style="
            display: flex !important;
            align-items: center !important;
            position: fixed !important;
            bottom: 20px;
            right: 20px;
            text-decoration: none;
            padding: 6px 10px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
            font-size: 12px !important;
            z-index: 9999 !important;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15) !important;
            border-radius: 8px !important;
            background-color: #ffffff !important;
            border: 1px solid rgba(255, 255, 255, 0.25) !important;
        "
    >
        <div style="display: flex; flex-direction: row; align-items: center">
            <img
                style="width: 20px; height: 20px; margin-right: 8px"
                src="https://avatars.githubusercontent.com/in/1201222?s=120&u=2686cf91179bbafbc7a71bfbc43004cf9ae1acea&v=4"
            />
            <p style="color: #000000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important; font-size: 12px !important; margin-bottom: 0;">
                Made with Emergent
            </p>
        </div>
    </a>
</body>
</html>
